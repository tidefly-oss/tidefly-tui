version: '3'
tasks:
  setup:
    desc: "Start the TUI setup wizard"
    cmds:
      - go run ./cmd/tidefly-installer

  lint:
    desc: "Run golangci-lint"
    cmds:
      - golangci-lint run ./...

  test:
    desc: "Run all Go tests"
    cmds:
      - go test ./... -v

  build:
    desc: "Build the TUI binary"
    cmds:
      - go build -o bin/tidefly-tui ./cmd/tidefly-installer

  fmt:
    desc: "Format Go code"
    cmds:
      - go fmt ./...

  clean:
    desc: "Clean build artifacts"
    cmds:
      - rm -rf bin/