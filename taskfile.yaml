version: "3"

tasks:
  default:
    desc: "Show all available tasks"
    silent: true
    cmds:
      - task --list

  # ── Setup / Lifecycle ─────────────────────────────────────────────────────

  setup:
    desc: "Start the TUI setup wizard"
    cmds:
      - go run ./cmd/tidefly-installer
    silent: false

  uninstall:
    desc: "Remove all Tidefly containers, volumes, networks and config"
    cmds:
      - go run ./cmd/tidefly-installer uninstall
    silent: false

  reset:
    desc: "Uninstall and reinstall (fresh start)"
    cmds:
      - task: uninstall
      - task: setup

  # ── Build ─────────────────────────────────────────────────────────────────

  build:
    desc: "Build the TUI binary"
    cmds:
      - go build -o bin/tidefly-tui ./cmd/tidefly-installer

  clean:
    desc: "Clean up build artifacts"
    cmds:
      - rm -rf bin/

  # ── Quality ───────────────────────────────────────────────────────────────

  lint:
    desc: "Run golangci-lint"
    cmds:
      - golangci-lint run ./...

  test:
    desc: "Run all Go tests"
    cmds:
      - go test ./... -v

  fmt:
    desc: "Format Go code"
    cmds:
      - go fmt ./...
      - goimports -w .

  tidy:
    desc: "go mod tidy"
    cmds:
      - go mod tidy