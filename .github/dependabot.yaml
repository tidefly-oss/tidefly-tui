version: 2
updates:
  # ─── TUI (Go) ──────────────────────────────────────────────────────────────
  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Europe/Berlin"
    assignees:
      - dbuettgen
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - go
    groups:
      go-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ─── GitHub Actions ────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: "Europe/Berlin"
    assignees:
      - dbuettgen
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        patterns:
          - "*"