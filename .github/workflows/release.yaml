name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate-tag:
    name: Validate Release Tag
    runs-on: ubuntu-latest
    steps:
      - name: Check tag format
        run: |
          TAG="${{ github.ref_name }}"
          if ! echo "$TAG" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+(-alpha|-beta|-rc\.[0-9]+)?$'; then
            echo "Invalid tag format: $TAG"
            echo "Expected: v0.0.1, v1.2.3-alpha, v1.2.3-beta, v1.2.3-rc.1"
            exit 1
          fi
          echo "Valid tag: $TAG"

  build:
    name: Build Binary
    runs-on: ubuntu-latest
    needs: validate-tag
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          EXT=""
          [ "$GOOS" = "windows" ] && EXT=".exe"
          go build \
            -ldflags="-s -w -X github.com/tidefly-oss/tidefly-tui/internal/version.Version=${{ github.ref_name }}" \
            -o dist/tidefly-tui-${{ matrix.goos }}-${{ matrix.goarch }}${EXT} \
            ./cmd/tidefly-installer

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tidefly-plane-tui-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/tidefly-plane-tui-*

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > checksums.txt

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION_CLEAN="${VERSION#v}"
          NOTES=$(awk "/^## \[${VERSION_CLEAN}\]/{found=1; next} found && /^## \[/{exit} found{print}" changelog.md)
          if [ -z "$NOTES" ]; then
            NOTES="See [changelog.md](changelog.md) for details."
          fi
          echo "notes<<EOF" >> $GITHUB_OUTPUT
          echo "$NOTES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Tidefly TUI ${{ github.ref_name }}
          body: |
            ## What's Changed

            ${{ steps.changelog.outputs.notes }}

            ## Installation

            Download the binary for your platform and run it:

            ```bash
            chmod +x tidefly-tui-linux-amd64
            ./tidefly-tui-linux-amd64
            ```

            ## Checksums

            See `checksums.txt` in the release assets.
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: false