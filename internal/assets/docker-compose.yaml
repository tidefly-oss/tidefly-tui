networks:
  tidefly_internal:
    driver: bridge
    labels:
      tidefly.internal: "true"
      external: true
  tidefly_proxy:
    external: true

volumes:
  postgres_data:
  redis_data:
  caddy_data:

services:
  # -----------------------------
  # Caddy Reverse Proxy
  # -----------------------------
  caddy:
    image: ghcr.io/tidefly-oss/tidefly-caddy:0.0.1
    container_name: tidefly_caddy
    labels:
      tidefly.internal: "true"
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
    networks:
      - tidefly_proxy
    environment:
      - CADDY_ADMIN=0.0.0.0:2019
    command: caddy run --resume
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2019/config/"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s

  # -----------------------------
  # Backend
  # -----------------------------
  backend:
    image: ghcr.io/tidefly-oss/tidefly-plane:latest
    container_name: tidefly_backend
    labels:
      tidefly.internal: "true"
    restart: unless-stopped
    env_file:
      - ./.env
    networks:
      - tidefly_internal
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      caddy:
        condition: service_healthy

  # -----------------------------
  # Frontend (optional profile)
  # -----------------------------
  ui:
    image: ghcr.io/tidefly-oss/tidefly-ui:latest
    container_name: tidefly_ui
    labels:
      tidefly.internal: "true"
    restart: unless-stopped
    env_file:
      - ./.env
    networks:
      - tidefly_internal
    depends_on:
      - backend
    profiles:
      - dashboard

  # -----------------------------
  # PostgreSQL
  # -----------------------------
  postgres:
    image: postgres:18-alpine
    container_name: tidefly_postgres
    labels:
      tidefly.internal: "true"
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - tidefly_internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-tidefly-plane} -d ${POSTGRES_DB:-tidefly-plane}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -----------------------------
  # Redis
  # -----------------------------
  redis:
    image: redis:8-alpine
    container_name: tidefly_redis
    labels:
      tidefly.internal: "true"
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    env_file:
      - ./.env
    volumes:
      - redis_data:/data
      - ./redis:/usr/local/etc/redis
    networks:
      - tidefly_internal
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--user",
          "tidefly-plane",
          "--pass",
          "${REDIS_PASSWORD}",
          "ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
