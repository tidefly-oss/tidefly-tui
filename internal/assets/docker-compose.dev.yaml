networks:
  tidefly_internal:
    name: tidefly_internal_dev
    driver: bridge

volumes:
  postgres_data:
    name: tidefly_postgres_data_dev
  redis_data:
    name: tidefly_redis_data_dev

services:
  postgres:
    image: postgres:18-alpine
    container_name: tidefly_postgres_dev
    labels:
      tidefly.internal: "true"
    restart: "no"
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - ./.env.dev
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - tidefly_internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-tidefly} -d ${POSTGRES_DB:-tidefly}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: valkey/valkey:9.0.4-alpine
    container_name: tidefly_valkey_dev
    labels:
      tidefly.internal: "true"
    restart: "no"
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    env_file:
      - ./.env.dev
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
      - ./redis:/usr/local/etc/redis
    networks:
      - tidefly_internal
    healthcheck:
      test:
        [
          "CMD",
          "redis-cli",
          "--user",
          "tidefly",
          "--pass",
          "${REDIS_PASSWORD}",
          "ping",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s