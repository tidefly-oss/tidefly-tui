networks:
  tidefly_internal:
    name: tidefly_internal_dev
    driver: bridge

volumes:
  postgres_data:
    name: tidefly_postgres_data_dev

services:
  postgres:
    image: postgres:18-alpine
    container_name: tidefly_postgres_dev
    labels:
      tidefly.internal: "true"
    restart: "no"
    ports:
      - "127.0.0.1:5432:5432"
    env_file:
      - ./.env.dev
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - tidefly_internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-tidefly} -d ${POSTGRES_DB:-tidefly}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s