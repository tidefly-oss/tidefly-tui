# golangci-lint configuration for Tidefly Backend
# https://golangci-lint.run/usage/configuration/

version: "2"

linters:
  enable:
    - bodyclose        # HTTP response body close check
    - dogsled          # blank identifier checks
    - dupl             # code duplication
    - errcheck         # unchecked errors
    - exhaustive       # exhaustive enum switches
    - funlen           # function length
    - gochecknoinits   # no init() functions
    - goconst          # repeated strings → constants
    - gocritic         # opinionated checks
    - gocyclo          # cyclomatic complexity
    - godot            # comment punctuation
    - gofmt            # formatting
    - goimports        # import ordering
    - gomnd            # magic numbers
    - goprintffuncname # printf-like function naming
    - gosec            # security checks
    - gosimple         # simplification
    - govet            # go vet
    - ineffassign      # ineffectual assignments
    - lll              # line length
    - misspell         # spelling
    - nakedret         # naked returns
    - noctx            # HTTP requests without context
    - nolintlint       # nolint directive style
    - revive           # extensible linter
    - rowserrcheck     # sql.Rows.Err check
    - staticcheck      # static analysis
    - stylecheck       # style checks
    - typecheck        # type checking
    - unconvert        # unnecessary type conversions
    - unparam          # unused function parameters
    - unused           # unused code
    - whitespace       # whitespace issues

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  funlen:
    lines: 80
    statements: 50

  gocyclo:
    min-complexity: 15

  gomnd:
    ignored-numbers:
      - "0"
      - "1"
      - "2"
      - "10"
      - "100"

  gosec:
    excludes:
      - G601 # implicit memory aliasing (fixed in Go 1.22)

  lll:
    line-length: 120

  misspell:
    locale: US

  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"
          - "sayRepetitiveInsteadOfStutters"

issues:
  exclude-rules:
    # Test files get more lenient rules
    - path: "_test\\.go"
      linters:
        - funlen
        - gomnd
        - dupl
        - goconst

    # Main entrypoints
    - path: "cmd/.*\\.go"
      linters:
        - gochecknoinits

  max-issues-per-linter: 0
  max-same-issues: 0

run:
  timeout: 5m
  modules-download-mode: readonly